# Hiiri päälle
set -g mouse on

# Numerointi 1:stä alkaen
set -g base-index 1
setw -g pane-base-index 1

# Reload-pikanäppäin
bind r source-file ~/.tmux.conf \; display "Config ladattu!"

# Suurempi history
set -g history-limit 50000

# Miltä näyttää splittaus
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Ikkunoiden vaihto Alt + nuoli (ilman prefixiä)
bind -n M-Left previous-window
bind -n M-Right next-window

# Uusi ikkuna Alt + t
bind -n M-t new-window

# Status bar: hostname + kello
set -g status-style 'bg=colour234 fg=colour137'
set -g status-left ' #[fg=colour255,bold]#h #[default]'
set -g status-right '#[fg=colour255,bold]%d.%m %H:%M '
setw -g window-status-current-style 'fg=colour234 bg=colour148 bold'
setw -g window-status-current-format ' #I:#W '
